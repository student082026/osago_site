<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Печать договора ОСАГО</title>
    <style>
        @media print {
            body { margin: 0; padding: 20px; font-family: Arial, sans-serif; }
            .no-print { display: none; }
            .policy-container { max-width: 100%; }
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f0f0; padding: 20px; }
        .policy-container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .policy-header { text-align: center; border-bottom: 2px solid #ff9800; padding-bottom: 20px; margin-bottom: 20px; }
        .policy-header h1 { color: #ff9800; margin: 0; }
        .policy-number { font-size: 18px; font-weight: bold; margin: 10px 0; }
        .info-row { display: flex; margin: 10px 0; }
        .info-label { width: 200px; font-weight: bold; }
        .info-value { flex: 1; }
        .euro-protocol { background: #e8f5e9; padding: 15px; border-radius: 10px; margin: 20px 0; text-align: center; }
        .signatures { display: flex; justify-content: space-between; margin-top: 40px; padding-top: 20px; border-top: 1px solid #ddd; }
        .btn-print { background: #ff9800; color: white; border: none; padding: 12px 30px; border-radius: 30px; cursor: pointer; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>
<div class="policy-container" id="policyContent"></div>
<div class="no-print" style="text-align:center; margin-top:20px">
    <button class="btn-print" onclick="window.print()">🖨️ Распечатать договор</button>
    <button class="btn-print" style="background:#666" onclick="window.close()">Закрыть</button>
</div>
<script>
    function loadContractForPrint() {
        let urlParams = new URLSearchParams(window.location.search);
        let contractId = parseInt(urlParams.get('id'));
        let contracts = JSON.parse(localStorage.getItem('contracts') || '[]');
        let contract = contracts.find(c => c.id === contractId);
        if (!contract) {
            document.getElementById('policyContent').innerHTML = '<h2>Договор не найден</h2>';
            return;
        }
        
        let policyNumber = contract.contract_number;
        let issueDate = new Date(contract.created_at).toLocaleDateString();
        let startDate = contract.start_date;
        let endDate = contract.end_date;
        
        let html = `
            <div class="policy-header">
                <h1>СТРАХОВОЙ ПОЛИС ОСАГО</h1>
                <div class="policy-number">Серия и номер: ${policyNumber}</div>
                <div>Дата выдачи: ${issueDate}</div>
            </div>
            <div class="euro-protocol">
                <strong>✅ Электронный полис (Европротокол)</strong><br>
                Договор действителен на всей территории РФ. При ДТП до 100 000 ₽ можно оформить европротокол без ГИБДД.
            </div>
            <h3>Страхователь</h3>
            <div class="info-row"><div class="info-label">ФИО:</div><div class="info-value">${contract.client_name}</div></div>
            <div class="info-row"><div class="info-label">Паспорт:</div><div class="info-value">${contract.client_passport}</div></div>
            <div class="info-row"><div class="info-label">Телефон:</div><div class="info-value">${contract.client_phone}</div></div>
            
            <h3>Транспортное средство</h3>
            <div class="info-row"><div class="info-label">Марка/Модель:</div><div class="info-value">${contract.car_brand} ${contract.car_model}</div></div>
            <div class="info-row"><div class="info-label">Госномер:</div><div class="info-value">${contract.car_number}</div></div>
            
            <h3>Срок действия</h3>
            <div class="info-row"><div class="info-label">С:</div><div class="info-value">${startDate}</div></div>
            <div class="info-row"><div class="info-label">По:</div><div class="info-value">${endDate}</div></div>
            
            <h3>Страховая сумма и премия</h3>
            <div class="info-row"><div class="info-label">Страховая сумма:</div><div class="info-value">${contract.insurance_sum.toLocaleString()} ₽</div></div>
            <div class="info-row"><div class="info-label">Страховая премия:</div><div class="info-value">${contract.premium.toLocaleString()} ₽</div></div>
            
            <div class="signatures">
                <div>_____________ / Страхователь</div>
                <div>_____________ / Страховая компания</div>
            </div>
            <div style="margin-top: 20px; font-size: 12px; color: #999; text-align: center;">
                Настоящий полис является электронным и имеет юридическую силу.<br>
                ОСАГО-Контроль © 2024
            </div>
        `;
        document.getElementById('policyContent').innerHTML = html;
    }
    loadContractForPrint();
</script>
</body>
</html>
